<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f" />
      <stop offset="100%" stop-color="#1a0a2e" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="42%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- subtle grid dots -->
  <g fill="#ffffff" fill-opacity="0.04">
    <circle cx="120" cy="110" r="3" />
    <circle cx="1080" cy="520" r="3" />
    <circle cx="980" cy="140" r="2.5" />
    <circle cx="180" cy="500" r="2.5" />
  </g>

  <!-- badge -->
  <g transform="translate(600, 196)">
    <rect x="-202" y="-26" width="404" height="52" rx="26" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1.5" />
    <circle cx="-168" cy="0" r="5" fill="#10b981" />
    <text x="20" y="9" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans CJK JP','Yu Gothic',sans-serif" font-size="26" fill="#c4b5fd" text-anchor="middle" font-weight="600">個人開発者のためのコミュニティ</text>
  </g>

  <!-- Title -->
  <text x="600" y="360" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="160" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-4">DevHub</text>

  <!-- Subtext -->
  <text x="600" y="440" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans CJK JP','Yu Gothic',sans-serif" font-size="40" font-weight="600" fill="#cbd5e1" text-anchor="middle">個人開発者の進捗共有コミュニティ</text>

  <!-- accent underline -->
  <rect x="500" y="396" width="200" height="6" rx="3" fill="url(#accent)" />

  <!-- bottom-right url -->
  <text x="1150" y="590" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="24" fill="#64748b" text-anchor="end">devhub-three-rho.vercel.app</text>
</svg>
